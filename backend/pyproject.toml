[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",             # isort
    "B",             # bugbear
    "UP",            # pyupgrade
    "S",             # bandit (security)
    "DJ",            # flake8-django
    "RUF",           # ruff-specific
]
ignore = [
    "S101",  # asserts allowed in tests
    "DJ001", # nullable CharField is acceptable in many cases
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S105", "S106"]
"**/settings/**" = ["F401", "F403", "F405"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "ecomart.settings.dev"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = "--strict-markers --reuse-db"
