# Dev orchestration. Production uses a separate compose file with gunicorn,
# nginx, and external managed services (RDS, ElastiCache).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecomart}
      POSTGRES_USER: ${POSTGRES_USER:-ecomart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecomart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host port shifted to avoid collisions with a local Postgres install.
      # Inside the docker network the service is still reachable as db:5432.
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecomart}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Host port shifted to avoid collisions with local redis. Inside the
      # docker network the service is still reachable as redis:6379.
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
